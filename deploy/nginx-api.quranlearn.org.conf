# Nginx reverse proxy for the QuranLearn API.
# Install:
#   sudo cp deploy/nginx-api.quranlearn.org.conf /etc/nginx/sites-available/api.quranlearn.org
#   sudo ln -s /etc/nginx/sites-available/api.quranlearn.org /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then issue TLS:
#   sudo certbot --nginx -d api.quranlearn.org

server {
    listen 80;
    listen [::]:80;
    server_name api.quranlearn.org;

    # certbot will manage the 80->443 redirect after it runs; until then this
    # block proxies plain HTTP so you can verify the upstream is reachable.
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
